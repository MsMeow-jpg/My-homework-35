<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asterix & Obelix Fanpage</title>
</head>
<body>
  <header>
    <h1>Asterix and Obelix</h1>
  </header>

  <main>
    <div class="characters">
      <div class="character" data-name="Asterix">
        <img alt="Asterix">
        <button>Biography</button>
      </div>
      <div class="character" data-name="Obelix">
        <img alt="Obelix">
        <button>Biography</button>
      </div>
      <div class="character" data-name="Getafix">
        <img alt="Getafix">
        <button>Biography</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="dogmafix-player">
      <img alt="Dogmafix" id="dogmafixBtn">
      <audio id="dogmafixAudio"></audio>
    </div>
  </footer>

  <div id="bioModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle"></h2>
      <p id="modalBio"></p>
    </div>
  </div>
</body>
</html>
